name: Build & Release

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: .exe
            archive-ext: .zip
            extract-cmd: Expand-Archive
            alist-name: alist-windows-amd64.zip
            bore-platform: x86_64-pc-windows-msvc
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: ""
            archive-ext: .tar.gz
            extract-cmd: tar
            alist-name: alist-linux-amd64.tar.gz
            bore-platform: x86_64-unknown-linux-musl
          - os: macos-latest
            target: universal-apple-darwin
            ext: ""
            archive-ext: .tar.gz
            extract-cmd: tar
            alist-name: alist-darwin-amd64.tar.gz
            bore-platform: x86_64-apple-darwin

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Install dependencies
      run: npm install

    # ===== Windows =====
    - name: Download AList & Bore (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path resources
        # AList
        Invoke-WebRequest -Uri "https://github.com/AlistGo/alist/releases/latest/download/${{ matrix.alist-name }}" -OutFile "alist.zip"
        Expand-Archive -Path "alist.zip" -DestinationPath "alist-temp"
        Copy-Item -Path "alist-temp\alist.exe" -Destination "resources\alist.exe"
        # Bore
        $boreTag = (Invoke-WebRequest -Uri "https://api.github.com/repos/ekzhang/bore/releases/latest" | ConvertFrom-Json).tag_name
        Invoke-WebRequest -Uri "https://github.com/ekzhang/bore/releases/download/$boreTag/bore-$boreTag-${{ matrix.bore-platform }}.zip" -OutFile "bore.zip"
        Expand-Archive -Path "bore.zip" -DestinationPath "bore-temp"
        Copy-Item -Path "bore-temp\bore.exe" -Destination "resources\bore.exe"
        Remove-Item -Recurse -Force "alist.zip", "alist-temp", "bore.zip", "bore-temp"

    # ===== Linux =====
    - name: Download AList & Bore (Linux)
      if: runner.os == 'Linux'
      run: |
        mkdir -p resources
        # AList
        curl -sL "https://github.com/AlistGo/alist/releases/latest/download/${{ matrix.alist-name }}" -o alist.tar.gz
        tar xzf alist.tar.gz alist
        chmod +x alist && mv alist resources/
        # Bore
        boreTag=$(curl -s "https://api.github.com/repos/ekzhang/bore/releases/latest" | grep -o '"tag_name":"[^"]*"' | cut -d'"' -f4)
        curl -sL "https://github.com/ekzhang/bore/releases/download/$boreTag/bore-$boreTag-${{ matrix.bore-platform }}.tar.gz" -o bore.tar.gz
        tar xzf bore.tar.gz bore
        chmod +x bore && mv bore resources/
        rm -f alist.tar.gz bore.tar.gz

    # ===== macOS =====
    - name: Download AList & Bore (macOS)
      if: runner.os == 'macOS'
      run: |
        mkdir -p resources
        # AList (use amd64, works on both Intel and Apple Silicon via Rosetta)
        curl -sL "https://github.com/AlistGo/alist/releases/latest/download/${{ matrix.alist-name }}" -o alist.tar.gz
        tar xzf alist.tar.gz alist
        chmod +x alist && mv alist resources/
        # Bore
        boreTag=$(curl -s "https://api.github.com/repos/ekzhang/bore/releases/latest" | grep -o '"tag_name":"[^"]*"' | cut -d'"' -f4)
        curl -sL "https://github.com/ekzhang/bore/releases/download/$boreTag/bore-$boreTag-${{ matrix.bore-platform }}.tar.gz" -o bore.tar.gz
        tar xzf bore.tar.gz bore
        chmod +x bore && mv bore resources/
        rm -f alist.tar.gz bore.tar.gz

    - name: Build
      run: npm run build

    # ===== Upload artifact =====
    - name: Upload artifact (Windows)
      if: runner.os == 'Windows'
      uses: actions/upload-artifact@v4
      with:
        name: alist-bore-${{ matrix.target }}
        path: src-tauri\target\release\AListBore.exe

    - name: Upload artifact (Linux)
      if: runner.os == 'Linux'
      uses: actions/upload-artifact@v4
      with:
        name: alist-bore-${{ matrix.target }}
        path: src-tauri/target/release/AListBore

    - name: Upload artifact (macOS)
      if: runner.os == 'macOS'
      uses: actions/upload-artifact@v4
      with:
        name: alist-bore-${{ matrix.target }}
        path: src-tauri/target/release/AListBore

    # ===== Release =====
    - name: Create Release (Windows)
      if: startsWith(github.ref, 'refs/tags/v') && runner.os == 'Windows'
      uses: softprops/action-gh-release@v2
      with:
        files: src-tauri\target\release\AListBore.exe
        generate_release_notes: true

    - name: Create Release (Linux)
      if: startsWith(github.ref, 'refs/tags/v') && runner.os == 'Linux'
      uses: softprops/action-gh-release@v2
      with:
        files: src-tauri/target/release/AListBore

    - name: Create Release (macOS)
      if: startsWith(github.ref, 'refs/tags/v') && runner.os == 'macOS'
      uses: softprops/action-gh-release@v2
      with:
        files: src-tauri/target/release/AListBore
