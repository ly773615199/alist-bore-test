name: Build & Release

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable

    # ===== Linux 系统依赖 =====
    - name: Install Linux dependencies
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

    - name: Install dependencies
      run: npm install

    # ===== Windows =====
    - name: Download AList & Bore (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        New-Item -ItemType Directory -Force -Path resources
        # AList
        Invoke-WebRequest -Uri "https://github.com/AlistGo/alist/releases/latest/download/alist-windows-amd64.zip" -OutFile "alist.zip" -UseBasicParsing
        Expand-Archive -Path "alist.zip" -DestinationPath "alist-temp"
        Copy-Item -Path "alist-temp\alist.exe" -Destination "resources\alist.exe"
        Remove-Item -Recurse -Force "alist.zip", "alist-temp"
        # Bore - authenticated API request
        $headers = @{ "Accept" = "application/vnd.github+json"; "Authorization" = "Bearer $env:GH_TOKEN" }
        $assets = Invoke-WebRequest -Uri "https://api.github.com/repos/ekzhang/bore/releases/latest" -Headers $headers -UseBasicParsing | ConvertFrom-Json
        $boreUrl = ($assets.assets | Where-Object { $_.name -like "*x86_64-pc-windows-msvc.zip" }).browser_download_url
        Invoke-WebRequest -Uri $boreUrl -OutFile "bore.zip" -UseBasicParsing
        Expand-Archive -Path "bore.zip" -DestinationPath "bore-temp"
        Copy-Item -Path "bore-temp\bore.exe" -Destination "resources\bore.exe"
        Remove-Item -Recurse -Force "bore.zip", "bore-temp"

    # ===== Linux =====
    - name: Download AList & Bore (Linux)
      if: runner.os == 'Linux'
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        set -e
        mkdir -p resources
        # AList
        curl -fSL --retry 3 --retry-delay 5 \
          "https://github.com/AlistGo/alist/releases/latest/download/alist-linux-amd64.tar.gz" -o alist.tar.gz
        tar xzf alist.tar.gz
        chmod +x alist && mv alist resources/
        rm -f alist.tar.gz
        # Bore - authenticated API request
        boreUrl=$(curl -fsSL \
          -H "Accept: application/vnd.github+json" \
          -H "Authorization: Bearer $GH_TOKEN" \
          "https://api.github.com/repos/ekzhang/bore/releases/latest" \
          | python3 -c "import sys,json; [print(a['browser_download_url']) for a in json.load(sys.stdin)['assets'] if 'x86_64-unknown-linux-musl.tar.gz' in a['name']]")
        echo "Downloading bore from: $boreUrl"
        curl -fSL --retry 3 --retry-delay 5 "$boreUrl" -o bore.tar.gz
        tar xzf bore.tar.gz
        chmod +x bore && mv bore resources/
        rm -f bore.tar.gz

    # ===== macOS =====
    - name: Download AList & Bore (macOS)
      if: runner.os == 'macOS'
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        set -e
        mkdir -p resources
        # AList (amd64, works on both Intel and Apple Silicon via Rosetta)
        curl -fSL --retry 3 --retry-delay 5 \
          "https://github.com/AlistGo/alist/releases/latest/download/alist-darwin-amd64.tar.gz" -o alist.tar.gz
        tar xzf alist.tar.gz
        chmod +x alist && mv alist resources/
        rm -f alist.tar.gz
        # Bore - authenticated API request
        boreUrl=$(curl -fsSL \
          -H "Accept: application/vnd.github+json" \
          -H "Authorization: Bearer $GH_TOKEN" \
          "https://api.github.com/repos/ekzhang/bore/releases/latest" \
          | python3 -c "import sys,json; [print(a['browser_download_url']) for a in json.load(sys.stdin)['assets'] if 'x86_64-apple-darwin.tar.gz' in a['name']]")
        echo "Downloading bore from: $boreUrl"
        curl -fSL --retry 3 --retry-delay 5 "$boreUrl" -o bore.tar.gz
        tar xzf bore.tar.gz
        chmod +x bore && mv bore resources/
        rm -f bore.tar.gz

    - name: Build
      run: npm run build

    # ===== Upload artifact =====
    - name: Upload artifact (Windows)
      if: runner.os == 'Windows'
      uses: actions/upload-artifact@v4
      with:
        name: alist-bore-${{ matrix.target }}
        path: src-tauri\target\release\AListBore.exe

    - name: Upload artifact (Linux/macOS)
      if: runner.os != 'Windows'
      uses: actions/upload-artifact@v4
      with:
        name: alist-bore-${{ matrix.target }}
        path: src-tauri/target/release/AListBore

    # ===== Release =====
    - name: Create Release (Windows)
      if: startsWith(github.ref, 'refs/tags/v') && runner.os == 'Windows'
      uses: softprops/action-gh-release@v2
      with:
        files: src-tauri\target\release\AListBore.exe
        generate_release_notes: true

    - name: Create Release (Linux/macOS)
      if: startsWith(github.ref, 'refs/tags/v') && runner.os != 'Windows'
      uses: softprops/action-gh-release@v2
      with:
        files: src-tauri/target/release/AListBore
